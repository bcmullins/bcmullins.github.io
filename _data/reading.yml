  commentary: "Tales of the Weird is a book series from the British Library reprinting lesser known novels and themed short story collections from weird fiction, broadly construed. The current collection is meant to pull from a variety of themes to introduce the reader to the many flavors of weird fiction."
  tags: [Fiction]
  type: "Book"
  era: "2020s"

