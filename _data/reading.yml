- title: "After Adam Smith: A Century of Transformation in Politics and Political Economy"
  author: "Murray Milgate and Shannon G. Stimson"
  year: 2009
  context: "Interesting Books from 2025"
  contextlink: "interesting-books-2025#after-adam-smith-a-century-of-transformation-in-politics-and-political-economy"
  commentary: "When you think of Adam Smith, several ideas might come to mind: the invisible hand, laissez faire, pin factories and the division of labor, the perfectly competitive market, and the butcher, the baker, and the candlestick maker. Though these ideas are often attributed to Smith today, what he meant by them looked rather different in some cases. This book traces the evolution of Smith's ideas and the path of political economy from their introduction to the close of classical period in the 1870s."
  tags: [Economics]
  type: "Book"
  era: "2000s"

- title: "Philosophical Analysis: Its development between the two World Wars"
  author: "J. O. Urmson"
  year: 1956
  context: "Interesting Books from 2025"
  contextlink: "interesting-books-2025#philosophical-analysis-its-development-between-the-two-world-wars"
  commentary: "During the second world war, a curious change quietly happened in British philosophy: the logical approach to language and metaphysics was supplanted by the ordinary language approach. This short book surveys the rise and fall of the logical approach and the many developments in-between. While Urmson is firmly rooted in the ordinary language tradition, he offers a clear and reasonable account of how and why the logical approach came to be."
  tags: [Philosophy]
  type: "Book"
  era: "1950s"

